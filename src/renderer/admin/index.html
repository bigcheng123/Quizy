<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
  <title>Quizy — 管理后台</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>🎓 Quizy 管理后台</h1>
      <nav>
        <button type="button" class="nav-btn active" data-tab="settings">⚙️ 基础设置</button>
        <button type="button" class="nav-btn" data-tab="questions">📚 题库管理</button>
        <button type="button" class="nav-btn" data-tab="records">📊 答题记录</button>
      </nav>
    </header>

    <!-- 基础设置 -->
    <section id="tab-settings" class="tab-content active">
      <h2>基础设置</h2>
      <div class="form-group">
        <label>当前年级</label>
        <select id="grade-select">
          <option value="1">一年级</option>
          <option value="2">二年级</option>
          <option value="3">三年级</option>
          <option value="4">四年级</option>
          <option value="5">五年级</option>
          <option value="6">六年级</option>
        </select>
      </div>
      <div class="form-group">
        <label>每日语文需答对题数</label>
        <input type="number" id="req-chinese" min="1" max="20" value="5">
      </div>
      <div class="form-group">
        <label>每日数学需答对题数</label>
        <input type="number" id="req-math" min="1" max="20" value="5">
      </div>
      <div class="form-group">
        <label>管理员新密码（留空不修改）</label>
        <input type="password" id="new-password" placeholder="输入新密码" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>确认新密码</label>
        <input type="password" id="confirm-password" placeholder="再次输入新密码" autocomplete="new-password">
      </div>
      <button type="button" class="btn-primary" id="btn-save-settings">保存设置</button>
      <p id="settings-msg" class="msg"></p>

      <div class="stats-box">
        <h3>当前题库统计</h3>
        <div id="stats-grid" class="stats-grid"></div>
      </div>
    </section>

    <!-- 题库管理 -->
    <section id="tab-questions" class="tab-content">
      <h2>题库管理</h2>
      <div class="filter-bar">
        <select id="filter-subject">
          <option value="">全部科目</option>
          <option value="chinese">语文</option>
          <option value="math">数学</option>
        </select>
        <select id="filter-grade">
          <option value="">全部年级</option>
          <option value="1">一年级</option>
          <option value="2">二年级</option>
          <option value="3">三年级</option>
          <option value="4">四年级</option>
          <option value="5">五年级</option>
          <option value="6">六年级</option>
        </select>
        <select id="filter-type">
          <option value="">全部类型</option>
          <option value="choice">选择题</option>
          <option value="judge">判断题</option>
          <option value="fill">填空题</option>
          <option value="image">看图题</option>
        </select>
        <button type="button" class="btn-primary" id="btn-filter-questions">筛选</button>
        <button type="button" class="btn-success" id="btn-add-question">+ 新增题目</button>
      </div>

      <!-- 新增/编辑表单 -->
      <div id="question-form" style="display:none">
        <h3 id="form-title">新增题目</h3>
        <input type="hidden" id="edit-id">
        <div class="form-row">
          <div class="form-group">
            <label>科目</label>
            <select id="q-subject">
              <option value="chinese">语文</option>
              <option value="math">数学</option>
            </select>
          </div>
          <div class="form-group">
            <label>年级</label>
            <select id="q-grade">
              <option value="1">一年级</option>
              <option value="2">二年级</option>
              <option value="3">三年级</option>
              <option value="4">四年级</option>
              <option value="5">五年级</option>
              <option value="6">六年级</option>
            </select>
          </div>
          <div class="form-group">
            <label>题目类型</label>
            <select id="q-type">
              <option value="choice">选择题</option>
              <option value="judge">判断题</option>
              <option value="fill">填空题</option>
              <option value="image">看图题</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>题目内容</label>
          <textarea id="q-content" rows="3" placeholder="请输入题目内容"></textarea>
        </div>
        <div id="options-form" class="form-group">
          <label>选项（每行一个，共4个）</label>
          <input type="text" id="opt-a" placeholder="选项 A">
          <input type="text" id="opt-b" placeholder="选项 B">
          <input type="text" id="opt-c" placeholder="选项 C">
          <input type="text" id="opt-d" placeholder="选项 D">
        </div>
        <div class="form-group">
          <label>正确答案</label>
          <input type="text" id="q-answer" placeholder="填写正确答案（选择题填A/B/C/D对应内容，判断题填"正确"或"错误"）">
        </div>
        <div class="form-btns">
          <button type="button" class="btn-primary" id="btn-submit-question">保存</button>
          <button type="button" class="btn-cancel" id="btn-cancel-question-form">取消</button>
          <p id="form-msg" class="msg"></p>
        </div>
      </div>

      <!-- 题目列表 -->
      <div id="questions-list"></div>
    </section>

    <!-- 答题记录 -->
    <section id="tab-records" class="tab-content">
      <h2>答题记录</h2>
      <div class="filter-bar">
        <select id="records-date-select">
          <option value="">-- 选择日期 --</option>
        </select>
      </div>
      <div id="records-summary"></div>
      <div id="records-list"></div>
    </section>
  </div>

  <script src="admin.js"></script>
</body>
</html>
