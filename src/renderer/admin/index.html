<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
  <title>Quizy — 管理后台</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>🎓 Quizy 管理后台</h1>
      <nav>
        <button type="button" class="nav-btn active" data-tab="settings">⚙️ 基础设置</button>
        <button type="button" class="nav-btn" data-tab="questions">📚 题库管理</button>
        <button type="button" class="nav-btn" data-tab="preview">👁 题目预览</button>
        <button type="button" class="nav-btn" data-tab="records">📊 答题记录</button>
      </nav>
      <button type="button" class="btn-force-quit" id="btn-force-quit" title="关闭 Quizy 并返回 Windows 桌面">强制结束程序</button>
    </header>

    <!-- 基础设置 -->
    <section id="tab-settings" class="tab-content active">
      <h2>基础设置</h2>
      <div class="form-group">
        <label>当前年级</label>
        <select id="grade-select">
          <option value="1">一年级</option>
          <option value="2">二年级</option>
          <option value="3">三年级</option>
          <option value="4">四年级</option>
          <option value="5">五年级</option>
          <option value="6">六年级</option>
        </select>
      </div>
      <div class="form-group">
        <label>练习科目（可多选，至少选一科）</label>
        <div class="checkbox-group" id="subjects-group">
          <label class="checkbox-label"><input type="checkbox" name="cfg-subject" value="chinese" checked> 语文</label>
          <label class="checkbox-label"><input type="checkbox" name="cfg-subject" value="math" checked> 数学</label>
        </div>
      </div>
      <div class="form-group">
        <label>题目类型（可多选，至少选一种）</label>
        <div class="checkbox-group" id="question-types-group">
          <label class="checkbox-label"><input type="checkbox" name="cfg-qtype" value="choice" checked> 选择题</label>
          <label class="checkbox-label"><input type="checkbox" name="cfg-qtype" value="judge" checked> 判断题</label>
          <label class="checkbox-label"><input type="checkbox" name="cfg-qtype" value="fill" checked> 填空题</label>
          <label class="checkbox-label"><input type="checkbox" name="cfg-qtype" value="image" checked> 看图题</label>
        </div>
      </div>
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="exclude-correct" checked>
          答对的题目记录后不再出现（答错的题目本次练习仍可能再次出现）
        </label>
      </div>
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="open-at-login" checked>
          开机启动（开启后 Quizy 将加入 Windows 登录启动项，用户登录时自动运行）
        </label>
      </div>
      <div class="form-group">
        <label>每日语文需答对题数</label>
        <input type="number" id="req-chinese" min="1" max="20" value="5">
      </div>
      <div class="form-group">
        <label>每日数学需答对题数</label>
        <input type="number" id="req-math" min="1" max="20" value="5">
      </div>
      <div class="form-group">
        <label>管理员新密码（留空不修改）</label>
        <input type="password" id="new-password" placeholder="输入新密码" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>确认新密码</label>
        <input type="password" id="confirm-password" placeholder="再次输入新密码" autocomplete="new-password">
      </div>
      <button type="button" class="btn-primary" id="btn-save-settings">保存设置</button>
      <p id="settings-msg" class="msg"></p>

      <div class="stats-box">
        <h3>当前题库统计</h3>
        <div id="stats-grid" class="stats-grid"></div>
      </div>

      <div class="maintenance-box">
        <h3>题库维护</h3>
        <p class="hint-line">修改 <code>data/seed-grade-*-{chinese|math}.json</code> 后，可删除本地数据库并重新从种子文件导入题目。</p>
        <button type="button" class="btn-danger" id="btn-reset-db-reload-seed">删除旧数据库并重新加载题目</button>
        <p id="reload-seed-msg" class="msg"></p>
      </div>
    </section>

    <!-- 题库管理 -->
    <section id="tab-questions" class="tab-content">
      <h2>题库管理</h2>
      <div class="filter-bar">
        <select id="filter-subject">
          <option value="">全部科目</option>
          <option value="chinese">语文</option>
          <option value="math">数学</option>
        </select>
        <select id="filter-grade">
          <option value="">全部年级</option>
          <option value="1">一年级</option>
          <option value="2">二年级</option>
          <option value="3">三年级</option>
          <option value="4">四年级</option>
          <option value="5">五年级</option>
          <option value="6">六年级</option>
        </select>
        <select id="filter-type">
          <option value="">全部类型</option>
          <option value="choice">选择题</option>
          <option value="judge">判断题</option>
          <option value="fill">填空题</option>
          <option value="image">看图题</option>
        </select>
        <button type="button" class="btn-primary" id="btn-filter-questions">筛选</button>
        <button type="button" class="btn-success" id="btn-add-question">+ 新增题目</button>
      </div>

      <!-- 新增/编辑表单 -->
      <div id="question-form" style="display:none">
        <h3 id="form-title">新增题目</h3>
        <input type="hidden" id="edit-id">
        <div class="form-row">
          <div class="form-group">
            <label>科目</label>
            <select id="q-subject">
              <option value="chinese">语文</option>
              <option value="math">数学</option>
            </select>
          </div>
          <div class="form-group">
            <label>年级</label>
            <select id="q-grade">
              <option value="1">一年级</option>
              <option value="2">二年级</option>
              <option value="3">三年级</option>
              <option value="4">四年级</option>
              <option value="5">五年级</option>
              <option value="6">六年级</option>
            </select>
          </div>
          <div class="form-group">
            <label>题目类型</label>
            <select id="q-type">
              <option value="choice">选择题</option>
              <option value="judge">判断题</option>
              <option value="fill">填空题</option>
              <option value="image">看图题</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>题目内容</label>
          <textarea id="q-content" rows="3" placeholder="请输入题目内容"></textarea>
        </div>
        <div id="options-form" class="form-group">
          <label>选项（每行一个，共4个）</label>
          <input type="text" id="opt-a" placeholder="选项 A">
          <input type="text" id="opt-b" placeholder="选项 B">
          <input type="text" id="opt-c" placeholder="选项 C">
          <input type="text" id="opt-d" placeholder="选项 D">
        </div>
        <div class="form-group">
          <label>正确答案</label>
          <input type="text" id="q-answer" placeholder="填写正确答案（选择题填A/B/C/D对应内容，判断题填"正确"或"错误"）">
        </div>
        <div class="form-btns">
          <button type="button" class="btn-primary" id="btn-submit-question">保存</button>
          <button type="button" class="btn-cancel" id="btn-cancel-question-form">取消</button>
          <p id="form-msg" class="msg"></p>
        </div>
      </div>

      <p class="hint-line">答对率按该题全部历史答题记录统计；孩子每答一题后此处会自动更新。</p>
      <!-- 题目列表 -->
      <div id="questions-list"></div>
    </section>

    <!-- 题目预览 -->
    <section id="tab-preview" class="tab-content">
      <h2>题目预览</h2>
      <p class="hint-line">按年级与科目浏览题库中的全部题目（含试卷配图与选项），便于核对导入效果。</p>
      <div class="filter-bar">
        <label class="filter-label">年级</label>
        <select id="preview-grade">
          <option value="1">一年级</option>
          <option value="2">二年级</option>
          <option value="3">三年级</option>
          <option value="4">四年级</option>
          <option value="5">五年级</option>
          <option value="6">六年级</option>
        </select>
        <label class="filter-label">科目</label>
        <select id="preview-subject">
          <option value="chinese">语文</option>
          <option value="math">数学</option>
        </select>
        <button type="button" class="btn-primary" id="btn-load-preview">刷新预览</button>
        <span id="preview-count" class="preview-count"></span>
      </div>
      <div id="preview-list"></div>
    </section>

    <!-- 答题记录 -->
    <section id="tab-records" class="tab-content">
      <h2>答题记录</h2>
      <div class="filter-bar">
        <select id="records-date-select">
          <option value="">-- 选择日期 --</option>
        </select>
      </div>
      <div id="records-summary"></div>
      <div id="records-list"></div>
    </section>
  </div>

  <script src="../quiz/exam-render.js"></script>
  <script src="admin.js"></script>
</body>
</html>
